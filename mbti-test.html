<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBTI性格测试 - 100题完整版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .progress-bar {
            background: rgba(255,255,255,0.3);
            border-radius: 20px;
            height: 30px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        .progress-fill {
            background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
            height: 100%;
            border-radius: 20px;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }
        
        .question-counter {
            color: #667eea;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 1.1em;
        }
        
        .question-text {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 25px;
            line-height: 1.6;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .option {
            padding: 18px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            font-size: 1.05em;
            color: #555;
        }
        
        .option:hover {
            border-color: #667eea;
            background: #f8f4ff;
            transform: translateX(5px);
        }
        
        .option.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .option-letter {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }
        
        .option.selected .option-letter {
            background: rgba(255,255,255,0.3);
            color: white;
        }
        
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }
        
        .btn {
            flex: 1;
            padding: 15px 30px;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #666;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        /* 结果页面样式 */
        .result-card {
            text-align: center;
        }
        
        .result-type {
            font-size: 4em;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 20px 0;
        }
        
        .result-name {
            font-size: 1.8em;
            color: #333;
            margin-bottom: 10px;
        }
        
        .result-desc {
            font-size: 1.1em;
            color: #666;
            line-height: 1.8;
            margin: 20px 0;
            text-align: left;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 12px;
        }
        
        .dimension-results {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 25px 0;
        }
        
        .dimension-item {
            padding: 15px;
            background: linear-gradient(135deg, #f8f9ff 0%, #e8f0ff 100%);
            border-radius: 12px;
        }
        
        .dimension-label {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        
        .dimension-name {
            font-size: 0.95em;
            color: #666;
            margin-top: 5px;
        }
        
        .dimension-bar {
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
        }
        
        .dimension-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        
        .share-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 30px;
            font-size: 1.1em;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
        }
        
        .share-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(245, 87, 108, 0.4);
        }
        
        /* 16种人格描述 */
        .type-detail {
            text-align: left;
            margin-top: 30px;
            padding: 25px;
            background: #f8f9ff;
            border-radius: 15px;
        }
        
        .type-detail h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.2em;
        }
        
        .type-detail ul {
            list-style: none;
            padding: 0;
        }
        
        .type-detail li {
            padding: 8px 0;
            padding-left: 25px;
            position: relative;
            color: #555;
        }
        
        .type-detail li::before {
            content: "✨";
            position: absolute;
            left: 0;
        }
        
        /* 响应式 */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8em;
            }
            
            .question-text {
                font-size: 1.1em;
            }
            
            .dimension-results {
                grid-template-columns: 1fr;
            }
            
            .result-type {
                font-size: 3em;
            }
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔮 MBTI性格测试</h1>
            <p>100题完整版 · 发现你的性格密码</p>
        </div>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill">1/100</div>
        </div>
        
        <!-- 测试页面 -->
        <div id="testPage">
            <div class="card">
                <div class="question-counter" id="questionCounter">第 1 题</div>
                <div class="question-text" id="questionText"></div>
                <div class="options" id="optionsContainer"></div>
                <div class="btn-group">
                    <button class="btn btn-secondary" id="prevBtn" onclick="prevQuestion()">上一题</button>
                    <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">下一题</button>
                </div>
            </div>
        </div>
        
        <!-- 结果页面 -->
        <div id="resultPage" class="hidden">
            <div class="card result-card">
                <h2>🎉 你的MBTI人格类型</h2>
                <div class="result-type" id="resultType">INTJ</div>
                <div class="result-name" id="resultName">建筑师</div>
                
                <div class="dimension-results" id="dimensionResults"></div>
                
                <div class="result-desc" id="resultDesc"></div>
                
                <div class="type-detail" id="typeDetail"></div>
                
                <button class="share-btn" onclick="shareResult()">📤 分享结果</button>
                <button class="btn btn-secondary" onclick="restartTest()" style="margin-top:15px;width:100%">🔄 重新测试</button>
            </div>
        </div>
    </div>
    
    <script>
        // MBTI题目数据 - 每维度25题
        const questions = [
            // ==================== E/I 维度 (1-25) ====================
            { q: "在社交聚会上，你通常会？", opts: ["主动与陌生人攀谈", "等待别人来接近你", "看情况，有时主动有时等待", "不确定"], scores: [4,0,2,1] },
            { q: "独处时，你会感到？", opts: ["有点无聊，希望有人陪伴", "非常放松和充电", "看心情", "不确定"], scores: [0,4,2,1] },
            { q: "你更喜欢哪种工作方式？", opts: ["和团队一起头脑风暴", "独自安静地工作", "视任务而定", "不确定"], scores: [4,0,2,1] },
            { q: "面对新朋友，你会？", opts: ["很快就熟络起来", "需要较长时间了解", "取决于对方性格", "不确定"], scores: [4,0,2,1] },
            { q: "你的周末更喜欢？", opts: ["约朋友出去玩", "在家休息或独自活动", "两者结合", "不确定"], scores: [4,0,2,1] },
            { q: "在会议上，你通常？", opts: ["积极发言，提出想法", "倾听为主，偶尔发言", "看话题感兴趣程度", "不确定"], scores: [4,0,2,1] },
            { q: "你获得能量的方式是？", opts: ["和他人互动交流", "独处思考", "视情况而定", "不确定"], scores: [0,4,2,1] },
            { q: "你喜欢什么样的娱乐方式？", opts: ["参加派对、KTV等热闹活动", "看书、看电影等安静活动", "两者都喜欢", "不确定"], scores: [4,0,2,1] },
            { q: "当遇到问题时，你会？", opts: ["第一时间找人讨论", "自己思考解决方案", "看问题类型", "不确定"], scores: [4,0,2,1] },
            { q: "你更擅长？", opts: ["即时口头沟通", "书面沟通", "两者差不多", "不确定"], scores: [4,0,2,1] },
            { q: "旅行时，你更喜欢？", opts: ["结伴旅行", "独自旅行", "两种都想尝试", "不确定"], scores: [4,0,2,1] },
            { q: "你在陌生人面前？", opts: ["很快就能打开话题", "显得比较拘谨", "看场合氛围", "不确定"], scores: [4,0,2,1] },
            { q: "下班后，你更想？", opts: ["和同事朋友去聚餐", "回家安静地休息", "看当天状态", "不确定"], scores: [4,0,2,1] },
            { q: "你喜欢哪种学习方式？", opts: ["小组讨论学习", "独自阅读研究", "两者结合", "不确定"], scores: [4,0,2,1] },
            { q: "你觉得自己是？", opts: ["外向开朗的", "内向沉稳的", "都可以切换", "不确定"], scores: [4,0,2,1] },
            { q: "接到电话时，你会？", opts: ["愿意接听并畅谈", "能不发就不发", "看是谁打的", "不确定"], scores: [4,0,2,1] },
            { q: "你更享受哪种谈话？", opts: ["多人热烈讨论", "一对一深度交流", "都很享受", "不确定"], scores: [4,2,3,1] },
            { q: "在人群中，你往往？", opts: ["吸引他人注意", "保持低调", "看情况", "不确定"], scores: [4,0,2,1] },
            { q: "你认识新朋友的方式是？", opts: ["主动出击", "通过共同朋友介绍", "顺其自然", "不确定"], scores: [4,0,2,1] },
            { q: "休闲时，你更倾向于？", opts: ["安排丰富的社交活动", "做自己喜欢的事", "看心情", "不确定"], scores: [4,0,2,1] },
            { q: "你在课堂上？", opts: ["喜欢举手发言", "认真听讲不发言", "看内容是否有共鸣", "不确定"], scores: [4,0,2,1] },
            { q: "你觉得自己像什么？", opts: ["人群中的中心人物", "安静观察者", "都可以", "不确定"], scores: [4,0,2,1] },
            { q: "你表达情感的方式？", opts: ["直接表达", "含蓄内敛", "看场合", "不确定"], scores: [4,0,2,1] },
            { q: "你喜欢的工作环境？", opts: ["开放热闹的办公室", "安静独立的办公空间", "两者结合", "不确定"], scores: [4,0,2,1] },
            { q: "朋友对你的评价是？", opts: ["社交达人", "可靠的朋友", "两者兼具", "不确定"], scores: [4,0,2,1] },
            
            // ==================== S/N 维度 (26-50) ====================
            { q: "你更关注？", opts: ["具体的事实和数据", "抽象的概念和可能性", "两者都重要", "不确定"], scores: [4,0,2,1] },
            { q: "你看小说的方式是？", opts: ["喜欢看细节描写", "关注故事背后的意义", "两者都喜欢", "不确定"], scores: [4,0,2,1] },
            { q: "面对问题时，你更注重？", opts: ["眼前的实际情况", "未来可能的发展", "两者都要考虑", "不确定"], scores: [4,0,2,1] },

            { q: "学习新事物时，你更看重？", opts: ["具体的操作方法", "背后的原理和联系", "两者都要学", "不确定"], scores: [4,0,2,1] },

            { q: "你被什么所吸引？", opts: ["实际的、有用的东西", "有趣的、有创意的东西", "两者都有", "不确定"], scores: [4,0,2,1] },
            { q: "你更享受哪种对话？", opts: ["谈论具体的事情", "探讨未来的可能性", "都可以", "不确定"], scores: [4,0,2,1] },
            { q: "你做事的方式？", opts: ["按部就班，循序渐进", "跳跃式思维，灵活应变", "两者结合", "不确定"], scores: [4,0,2,1] },
            { q: "你看重产品的？", opts: ["功能实用性", "设计创意性", "两者兼顾", "不确定"], scores: [4,0,2,1] },
            { q: "你更擅长？", opts: ["记忆事实和细节", "理解抽象概念", "两者都不错", "不确定"], scores: [4,0,2,1] },
            { q: "你做决定时更依赖？", opts: ["过去的经验", "未来的想象", "两者结合", "不确定"], scores: [4,0,2,1] },
            { q: "你更喜欢哪种老师？", opts: ["讲授具体知识", "启发思考", "两者结合", "不确定"], scores: [4,0,2,1] },
            { q: "你关注的是？", opts: ["现在是什么", "可以成为什么", "两者都关注", "不确定"], scores: [4,0,2,1] },
            { q: "你处理信息的方式？", opts: ["按部就班，逐一处理", "跳跃式联想", "看情况", "不确定"], scores: [4,0,2,1] },
            { q: "你更感兴趣的是？", opts: ["具体如何运作", "为什么是这样", "两者都有", "不确定"], scores: [4,0,2,1] },
            { q: "你看待世界的方式？", opts: ["务实、脚踏实地的", "充满想象力的", "两者兼具", "不确定"], scores: [4,0,2,1] },
            { q: "你更喜欢阅读？", opts: ["事实报道、操作指南", "文学作品、哲学思考", "都喜欢", "不确定"], scores: [4,0,2,1] },
            { q: "你解决问题时？", opts: ["使用已验证的方法", "尝试创新的方法", "两者结合", "不确定"], scores: [4,0,2,1] },

            // ==================== T/F 维度 (51-75) ====================

            { q: "你觉得规则？", opts: ["应该严格执行", "也要考虑人情", "具体情况具体分析", "不确定"], scores: [4,0,2,1] },
            { q: "当你伤害了别人，你更在意？", opts: ["对方能否理解你的用意", "对方受到了什么伤害", "两者都会考虑", "不确定"], scores: [4,0,2,1] },
            { q: "你更容易被什么打动？", opts: ["有力的论证", "真诚的表达", "两者都能打动", "不确定"], scores: [4,0,2,1] },
            { q: "你更看重？", opts: ["公平公正", "和谐融洽", "公平基础上的和谐", "不确定"], scores: [4,0,2,1] },

            { q: "你认为什么是成功？", opts: ["达成目标和成就", "被人认可和喜爱", "两者兼具", "不确定"], scores: [4,0,2,1] },

            scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
            
            // 计算E/I分数 (0-24题)
            for (let i = 0; i < 25; i++) {
                if (answers[i] !== -1) {
                    scores.E += questions[i].scores[answers[i]];
                }
            }
            scores.I = 100 - scores.E;
            
            // 计算S/N分数 (25-49题)
            for (let i = 25; i < 50; i++) {
                if (answers[i] !== -1) {
                    scores.N += questions[i].scores[answers[i]];
                }
            }
            scores.S = 100 - scores.N;
            
            // 计算T/F分数 (50-74题)
            for (let i = 50; i < 75; i++) {
                if (answers[i] !== -1) {
                    scores.F += questions[i].scores[answers[i]];
                }
            }
            scores.T = 100 - scores.F;
            
            // 计算J/P分数 (75-99题)
            for (let i = 75; i < 100; i++) {
                if (answers[i] !== -1) {
                    scores.P += questions[i].scores[answers[i]];
                }
            }
            scores.J = 100 - scores.P;
        }

            type += scores.J > scores.P ? 'J' : 'P';
